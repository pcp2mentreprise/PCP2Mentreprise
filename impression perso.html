<!DOCTYPE html>
<html lang="fr">
<head>
     <link rel="icon" href="C:\PCP2M-logo-couleur-Carrée - Copie.ico" type="image/x-icon">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PCP2M - Copier / coller des articles</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      color: #111827;
      background: #f8fbff;
      line-height: 1.6;
    }
    header {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .container { width: min(1150px, 92%); margin: auto; }
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
    }
    .brand { display: flex; align-items: center; gap: 12px; font-weight: 800; color: #0717ff; }
    .logo {
      width: 58px;
      height: 58px;
      object-fit: contain;
      border-radius: 10px;
    }
    nav a {
      color: #111827;
      text-decoration: none;
      margin-left: 22px;
      font-weight: 600;
    }
    .hero {
      padding: 75px 0;
      background: linear-gradient(135deg, #0717ff 0%, #095bd8 55%, #ffffff 55%);
    }
    .hero-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 36px;
      align-items: center;
    }
    .hero-card {
      background: rgba(255,255,255,0.95);
      padding: 42px;
      border-radius: 24px;
      box-shadow: 0 20px 45px rgba(0,0,0,0.15);
    }
    h1 { font-size: clamp(2rem, 5vw, 4rem); line-height: 1.05; margin-bottom: 18px; }
    .accent { color: #0717ff; }
    .btn {
      display: inline-block;
      margin-top: 24px;
      padding: 14px 24px;
      background: #0717ff;
      color: white;
      text-decoration: none;
      border-radius: 999px;
      font-weight: 800;
      border: none;
      cursor: pointer;
    }
    .btn.secondary { background: #ef4444; margin-left: 10px; }
    .hero-logo {
      background: white;
      border-radius: 28px;
      padding: 25px;
      box-shadow: 0 20px 45px rgba(0,0,0,0.16);
      text-align: center;
    }
    .hero-logo img { width: 100%; max-height: 360px; object-fit: contain; }
    section { padding: 70px 0; }
    h2 { font-size: 2.2rem; margin-bottom: 15px; text-align: center; }
    .subtitle { text-align: center; color: #4b5563; max-width: 720px; margin: 0 auto 38px; }
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
    }
    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.06);
      transition: transform 0.2s ease;
    }
    .card:hover { transform: translateY(-4px); }
    .card img {
      width: 100%;
      height: 190px;
      object-fit: cover;
    }
    .card-content { padding: 22px; }
    .card-content h3 { color: #0717ff; margin-bottom: 10px; }
    .price { font-size: 1.8rem; font-weight: 900; color: #095bd8; margin: 12px 0; }
    .badge { display: inline-block; margin-top: 8px; background: #eef4ff; color: #1e40af; padding: 6px 12px; border-radius: 999px; font-size: 0.95rem; font-weight: 700; }
    .form-grid { display: grid; gap: 18px; }
    .form-actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-end; margin-top: 18px; }
    .message { margin-top: 16px; color: #047857; font-weight: 700; text-align: center; }
    .steps {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }
    .step {
      background: #0717ff;
      color: white;
      padding: 24px;
      border-radius: 18px;
      text-align: center;
      font-weight: 700;
    }
    footer {
      background: #030712;
      color: white;
      padding: 32px 0;
      text-align: center;
    }
    @media (max-width: 850px) {
      .hero-grid, .cards, .steps { grid-template-columns: 1fr; }
      nav { display: none; }
      .hero { background: linear-gradient(160deg, #0717ff, #095bd8); }
      .form-actions { justify-content: center; }
    }
    button, input[type="submit"] {
      background-color: #0717ff;
      color: white;
      border: none;
      border-radius: 999px;
      font-weight: 800;
      cursor: pointer;
      padding: 14px 24px;
    }
  </style>
</head>
<body>
  <header>
    <div class="container nav">
      <div class="brand">
        <span>PCP2M</span>
      </div>
      <nav>
        <a href="Essaie.html">Accueil</a>
        <a href="#articles">Articles</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container hero-grid">
        
        <div class="hero-logo">
          <img src="https://via.placeholder.com/420x320?text=PCP2M" alt="PCP2M" />
        </div>
      </div>
    </section>

    <section id="articles">
      <div class="container">
        <h2>Liste des articles</h2>


        <div class="cards">
          <div class="card">
            <h3>Exemple d'article</h3>
            <p>Description de l'article imprimé en 3D. Remplacez-le par votre propre contenu.</p>
            <div class="price">Prix</div>
          </div>
        </div>

        <br><br>

        <div class="cards">
          <div class="card">
            <h3>Exemple d'article</h3>
            <p>Description de l'article imprimé en 3D. Remplacez-le par votre propre contenu.</p>
            <div class="price">Prix</div>
          </div>
        </div>


      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p><strong>PCP2M</strong> Site d'impression 3D.</p>
    </div>
  </footer>
</body>
</html>
